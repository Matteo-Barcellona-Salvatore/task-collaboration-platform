<nav class="navbar" [class.scrolled]="isScrolled">
  <div class="navbar-container">
    <!-- Logo -->
    <div class="navbar-brand">
      <a routerLink="/" class="logo">
        <span class="logo-icon"></span>
        <span class="logo-text">Task<span class="logo-highlight">Collab</span></span>
      </a>
    </div>

    <!-- Desktop Menu -->
    <div class="navbar-menu" [class.active]="isMenuOpen">
      <div class="menu-links">
        <a *ngIf="!isAuthenticated()" routerLink="/login" routerLinkActive="active" class="nav-link">
          <span>Login</span>
        </a>
        <a *ngIf="!isAuthenticated()" routerLink="/register" routerLinkActive="active" class="nav-link">
          <span>Register</span>
        </a>
        <a *ngIf="isAuthenticated()" routerLink="/dashboard" routerLinkActive="active" class="nav-link">
          <span>Dashboard</span>
        </a>
      </div>

      <!-- User Profile / Auth Buttons -->
      <div class="navbar-actions">
        <div *ngIf="isAuthenticated()" class="user-profile">
          <div class="user-avatar">
            <span>{{ currentUser?.fullName?.charAt(0) || 'U' }}</span>
          </div>
          <div class="user-info">
            <span class="user-name">{{ currentUser?.fullName || 'User' }}</span>
            <span class="user-email">{{ currentUser?.email }}</span>
          </div>
          <button (click)="logout()" class="logout-btn">
            <span class="logout-icon">🚪</span>
            <span>Logout</span>
          </button>
        </div>

        <div *ngIf="!isAuthenticated()" class="auth-buttons">
          <a routerLink="/login" class="btn btn-outline">Sign In</a>
          <a routerLink="/register" class="btn btn-primary">Get Started</a>
        </div>
      </div>
    </div>

    <!-- Mobile Menu Toggle -->
    <button class="mobile-menu-toggle" (click)="toggleMenu()" [class.active]="isMenuOpen">
      <span class="hamburger-line"></span>
      <span class="hamburger-line"></span>
      <span class="hamburger-line"></span>
    </button>
  </div>
</nav>
